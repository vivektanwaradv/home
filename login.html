<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Email & Password Auth</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #eef2f5;
            margin: 0;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .auth-container h2 {
            margin-top: 0;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .auth-btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background-color 0.2s;
            color: white;
        }
        .login-btn {
            background-color: #007bff;
        }
        .login-btn:hover { background-color: #0056b3; }
        
        .signup-btn {
            background-color: #28a745;
        }
        .signup-btn:hover { background-color: #1e7e34; }
        
        #message {
            margin-top: 15px;
            font-size: 14px;
            color: #d9534f; /* Default red for errors */
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Account Access</h2>
        
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="btn-group">
            <button type="button" id="loginBtn" class="auth-btn login-btn">Log In</button>
            <button type="button" id="signupBtn" class="auth-btn signup-btn">Sign Up</button>
        </div>

        <div id="message"></div>
    </div>

    <script type="module">
        // 1. Import Firebase core and auth functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // 2. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
  apiKey: "AIzaSyCuguX4R2Xa-Dl7Iavf9IZUhS4qAwMp6lA",
  authDomain: "vivek-tanwar.firebaseapp.com",
  projectId: "vivek-tanwar",
  storageBucket: "vivek-tanwar.firebasestorage.app",
  messagingSenderId: "108605442279",
  appId: "1:108605442279:web:cd2ffc9e39eb951a757a42",
  measurementId: "G-PK58ET19XQ"
};

        // 3. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const messageDiv = document.getElementById('message');

        // Helper function to display messages
        function showMessage(msg, isError = true) {
            messageDiv.style.color = isError ? "#d9534f" : "#28a745";
            messageDiv.textContent = msg;
        }

        // 4. Sign Up Logic (Create new account)
        signupBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            if(!email || !password) {
                return showMessage("Please enter both email and password.");
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    showMessage("Account created successfully! Welcome.", false);
                    console.log("Signed up:", user);
                    // window.location.href = "/dashboard.html"; // Redirect here
                })
                .catch((error) => {
                    showMessage(error.message);
                    console.error("Sign up error:", error.code, error.message);
                });
        });

        // 5. Log In Logic (Access existing account)
        loginBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            if(!email || !password) {
                return showMessage("Please enter both email and password.");
            }

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    showMessage("Logged in successfully!", false);
                    console.log("Logged in:", user);
                    // window.location.href = "/dashboard.html"; // Redirect here
                })
                .catch((error) => {
                    showMessage("Invalid email or password.");
                    console.error("Login error:", error.code, error.message);
                });
        });
    </script>
</body>
</html>
